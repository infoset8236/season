<script>
    $(function () {
        var $list = $('.noticeList');
        var $pagination = $('.pagination');
        var $items = $list.find('.noticeItem');
        var totalCount = $items.length;

        $items.each(function (i) {
            $(this).attr('data-index', i);
        });
        $items.removeClass('center');
        $pagination.html('<span>1</span> / ' + totalCount);
        $list.addClass('owl-carousel');

        function syncCenter() {
            $list.find('.noticeItem').removeClass('center');
            var $centerItem = $list.find('.owl-item.center .noticeItem');
            $centerItem.addClass('center');

            var idx = parseInt($centerItem.attr('data-index'), 10);
            if (!isNaN(idx)) {
                $pagination.find('span').text(idx + 1);
            }
        }

        $list.on('initialized.owl.carousel translated.owl.carousel', syncCenter);

        $list.owlCarousel({
            autoWidth: true,
            center: true,
            loop: true,
            autoplay: true,
            autoplayTimeout: 10000,
            autoplayHoverPause: false,
            smartSpeed: 600,
            nav: false,
            dots: false,
            mouseDrag: true,
            touchDrag: true,
            pullDrag: true
        });
    });
</script>
